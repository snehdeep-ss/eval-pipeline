task: custom_qa
dataset_path: json
dataset_kwargs:
  data_files:
    test: tasks/custom_qa/data.jsonl
test_split: test
doc_to_text: "Question: {{question}}\nAnswer:"
doc_to_target: "{{answer}}"
process_results: !function custom_qa_utils.process_results
metric_list:
  - metric: contains_match
    aggregation: mean
    higher_is_better: true
output_type: generate_until
generation_kwargs:
  until:
    - "\n"
  max_gen_toks: 32
